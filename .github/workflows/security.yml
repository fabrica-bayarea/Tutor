name: Security Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # =========================================================
  # CODEQL (SAST) — JavaScript (Next.js) + Python (Flask)
  # =========================================================
  codeql:
    name: CodeQL Analysis (${{ matrix.language }})
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    timeout-minutes: 40

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript
          - python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # =====================================================
      # NODE — Next.js frontend
      # =====================================================
      - name: Setup Node.js
        if: matrix.language == 'javascript'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: matrix.language == 'javascript'
        working-directory: ./frontend
        run: npm ci

      # =====================================================
      # PYTHON — Flask backend
      # =====================================================
      - name: Setup Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        if: matrix.language == 'python'
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # =====================================================
      # CODEQL
      # =====================================================
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          output: codeql-results

      # =====================================================
      # SECURITY GATE — bloqueia High/Critical (score >= 7)
      # =====================================================
      - name: Check High/Critical vulnerabilities
        shell: bash
        run: |
          sudo apt-get install -y jq -qq

          SARIF_FILE=$(find codeql-results -name "*.sarif" | head -1)

          if [ -z "$SARIF_FILE" ]; then
            echo "❌ No SARIF file found"
            exit 1
          fi

          COUNT=$(jq '
            [
              .runs[].results[]? as $result |
              (
                .runs[].tool.driver.rules[]?,
                .runs[].tool.extensions[]?.rules[]?
              ) |
              select(.id == $result.ruleId) |
              (.properties["security-severity"] // "0") |
              tonumber |
              select(. >= 7)
            ] | length
          ' "$SARIF_FILE")

          echo "High/Critical vulnerabilities found: $COUNT"

          if [ "$COUNT" -gt 0 ]; then
            echo "❌ CodeQL Security Gate failed — $COUNT issue(s) with severity >= 7"
            exit 1
          fi

          echo "✅ CodeQL passed"

  # =========================================================
  # SECURITY ANALYSIS
  # =========================================================
  security:
    name: Security Analysis
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    timeout-minutes: 60

    steps:

      # =====================================================
      # CHECKOUT
      # =====================================================
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =====================================================
      # NODE — Next.js
      # =====================================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # =====================================================
      # PYTHON — Flask + Gunicorn
      # =====================================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # =====================================================
      # CACHE
      # =====================================================
      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: ./frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-frontend-

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      # =====================================================
      # INSTALL DEPENDENCIES
      # =====================================================
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Python dependencies
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # =====================================================
      # TESTS
      # =====================================================
      - name: Run frontend tests
        continue-on-error: true
        working-directory: ./frontend
        run: npm test --if-present -- --passWithNoTests

      - name: Run backend tests
        continue-on-error: true
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pip install pytest pytest-cov
            pytest --cov=. --cov-report=xml --ignore=tests/e2e -q || true
          fi

      # =====================================================
      # NPM AUDIT — Next.js
      # =====================================================
      - name: Frontend npm audit
        id: npm_audit
        continue-on-error: true
        working-directory: ./frontend
        run: npm audit --audit-level=high

      # =====================================================
      # PYTHON SECURITY — Flask + dependências
      # =====================================================
      - name: Install Python security tools
        run: pip install pip-audit bandit

      - name: pip-audit
        id: pipaudit
        continue-on-error: true
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --output pip-audit-report.json --format json || true
            cat pip-audit-report.json
          fi

      # Bandit: usa --exit-zero para SEMPRE gerar o SARIF,
      # independente de encontrar ou não vulnerabilidades.
      # Severidade média e acima; ignora testes.
      - name: Bandit Scan
        id: bandit
        continue-on-error: true
        run: |
          bandit -r ./backend \
            --exit-zero \
            -ll \
            --exclude ./backend/tests \
            -f sarif \
            -o bandit.sarif
          echo "bandit_generated=$(test -f bandit.sarif && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Upload Bandit SARIF
        if: always() && steps.bandit.outputs.bandit_generated == 'true'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif
          category: bandit

      # =====================================================
      # SEMGREP — OWASP Top 10 + Flask + Python + JS
      # =====================================================
      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        id: semgrep
        continue-on-error: true
        run: |
          semgrep scan \
            --config "p/owasp-top-ten" \
            --config "p/flask" \
            --config "p/python" \
            --config "p/javascript" \
            --config "p/secrets" \
            --sarif \
            --output=semgrep.sarif \
            --timeout=120 \
            .
          echo "semgrep_generated=$(test -f semgrep.sarif && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Upload Semgrep SARIF
        if: always() && steps.semgrep.outputs.semgrep_generated == 'true'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      # =====================================================
      # DOCKER SECURITY — imagens backend e frontend
      # =====================================================
      - name: Build Docker images
        id: docker_build
        continue-on-error: true
        run: |
          docker build -t app-backend-test ./backend
          docker build -t app-frontend-test ./frontend
          echo "built=true" >> $GITHUB_OUTPUT

      - name: Trivy Scan — backend image
        id: trivy_backend
        if: steps.docker_build.outputs.built == 'true'
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app-backend-test
          format: sarif
          output: trivy-backend.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload Trivy backend SARIF
        if: always() && steps.docker_build.outputs.built == 'true' && hashFiles('trivy-backend.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Trivy Scan — frontend image
        id: trivy_frontend
        if: steps.docker_build.outputs.built == 'true'
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app-frontend-test
          format: sarif
          output: trivy-frontend.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload Trivy frontend SARIF
        if: always() && steps.docker_build.outputs.built == 'true' && hashFiles('trivy-frontend.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

      # =====================================================
      # KUBERNETES SECURITY — manifests K8s
      # =====================================================
      - name: KubeLinter Scan
        id: kubelinter
        continue-on-error: true
        uses: stackrox/kube-linter-action@v1
        with:
          directory: .
          config: .kube-linter.yaml

      # =====================================================
      # SECRET SCANNING
      # =====================================================
      - name: Gitleaks Scan
        id: gitleaks
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # =====================================================
      # SONARCLOUD
      # =====================================================
      - name: SonarCloud Scan
        id: sonar
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=fabrica-bayarea_Tutor
            -Dsonar.organization=fabrica-bayarea
            -Dsonar.sources=backend,frontend
            -Dsonar.tests=backend/tests
            -Dsonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/coverage/**,**/*.d.ts,**/__pycache__/**,**/*.pyc
            -Dsonar.python.version=3.11
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
            -Dsonar.python.coverage.reportPaths=backend/coverage.xml
            -Dsonar.qualitygate.wait=true

      # =====================================================
      # DEPENDENCY REVIEW — só em PRs
      # =====================================================
      - name: Dependency Review
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/dependency-review-action@v4

      # =====================================================
      # FINAL SECURITY GATE
      # Só falha se houver resultado "failure" explícito.
      # "skipped" e "cancelled" não bloqueiam o pipeline.
      # =====================================================
      - name: Security Gate
        if: always()
        shell: bash
        run: |
          FAILED=0

          check_step() {
            local name=$1
            local outcome=$2
            if [ "$outcome" = "failure" ]; then
              echo "❌ $name failed"
              FAILED=1
            elif [ "$outcome" = "skipped" ]; then
              echo "⚠️  $name was skipped"
            else
              echo "✅ $name: $outcome"
            fi
          }

          check_step "Bandit"      "${{ steps.bandit.outcome }}"
          check_step "Semgrep"     "${{ steps.semgrep.outcome }}"
          check_step "Trivy backend"  "${{ steps.trivy_backend.outcome }}"
          check_step "Trivy frontend" "${{ steps.trivy_frontend.outcome }}"
          check_step "KubeLinter"  "${{ steps.kubelinter.outcome }}"
          check_step "Gitleaks"    "${{ steps.gitleaks.outcome }}"
          check_step "npm audit"   "${{ steps.npm_audit.outcome }}"
          check_step "pip-audit"   "${{ steps.pipaudit.outcome }}"

          # SonarCloud: skipped é aceitável (ex: SONAR_TOKEN não configurado)
          SONAR_OUTCOME="${{ steps.sonar.outcome }}"
          if [ "$SONAR_OUTCOME" = "failure" ]; then
            echo "❌ SonarCloud Quality Gate failed"
            FAILED=1
          elif [ "$SONAR_OUTCOME" = "skipped" ]; then
            echo "⚠️  SonarCloud was skipped"
          else
            echo "✅ SonarCloud: $SONAR_OUTCOME"
          fi

          echo ""
          if [ "$FAILED" -eq 1 ]; then
            echo "❌ Security pipeline FAILED — review findings above"
            exit 1
          fi

          echo "✅ Security pipeline APPROVED"