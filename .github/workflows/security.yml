name: Security Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  # =========================================================
  # CODEQL — JavaScript/TypeScript (Next.js) + Python (Flask)
  # =========================================================
  codeql:
    name: CodeQL Analysis (${{ matrix.language }})
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    timeout-minutes: 40

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript
          - typescript
          - python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: matrix.language == 'javascript' || matrix.language == 'typescript'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: matrix.language == 'javascript' || matrix.language == 'typescript'
        working-directory: ./frontend
        run: npm ci

      - name: Setup Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        if: matrix.language == 'python'
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Rodar CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          output: codeql-results

      - name: Checar severidade no SARIF do CodeQL
        shell: bash
        run: |
          SARIF_FILE=$(find codeql-results -name "*.sarif" | head -1)

          if [ -z "$SARIF_FILE" ]; then
            echo "⚠️ Nenhum arquivo SARIF encontrado"
            exit 1
          fi

          COUNT=$(jq '
            [
              .runs[].results[]? as $result |
              (
                .runs[].tool.driver.rules[]?,
                .runs[].tool.extensions[]?.rules[]?
              ) |
              select(.id == $result.ruleId) |
              (.properties["security-severity"] // "0") |
              tonumber |
              select(. >= 7.0)
            ] | length
          ' "$SARIF_FILE")

          echo "⚠️ Alertas High/Critical encontrados: $COUNT"

          if [ "$COUNT" -gt 0 ]; then
            echo "❌ CodeQL encontrou $COUNT vulnerabilidade(s) High/Critical"
            jq -r '
              .runs[].results[]? as $result |
              (
                .runs[].tool.driver.rules[]?,
                .runs[].tool.extensions[]?.rules[]?
              ) |
              select(.id == $result.ruleId) |
              "\(.properties["security-severity"] // "?") | \($result.ruleId) | \($result.message.text)"
            ' "$SARIF_FILE"
            exit 1
          fi

          echo "✅ Nenhuma vulnerabilidade High/Critical encontrada"

  # =========================================================
  # SECURITY ANALYSIS — SCA + SAST + Secrets + Docker + Sonar
  # =========================================================
  security:
    name: Security Analysis
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    timeout-minutes: 60

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =====================================================
      # SETUP
      # =====================================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # =====================================================
      # CACHE
      # =====================================================
      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: ./frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-frontend-

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      # =====================================================
      # INSTALL
      # =====================================================
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Python dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Install Python security tools
        run: pip install pip-audit bandit bandit-sarif-formatter safety

      # =====================================================
      # TESTS
      # =====================================================
      - name: Run frontend tests
        continue-on-error: true
        working-directory: ./frontend
        run: npm test --if-present -- --passWithNoTests

      - name: Run backend tests
        continue-on-error: true
        working-directory: ./backend/application
        run: |
          pip install pytest pytest-cov
          pytest tests/ \
            --cov=application \
            --cov-report=xml:coverage.xml \
            -q || true

      # =====================================================
      # SCA — npm audit (frontend)
      # =====================================================
      - name: Frontend npm audit
        id: npm_audit
        continue-on-error: true
        working-directory: ./frontend
        run: npm audit --audit-level=high

      # =====================================================
      # SCA — pip-audit + safety (backend)
      # bancos de vuln diferentes, redundância intencional
      # =====================================================
      - name: pip-audit
        id: pipaudit
        continue-on-error: true
        working-directory: ./backend
        run: pip-audit -r requirements.txt

      - name: Safety check
        id: safety
        continue-on-error: true
        working-directory: ./backend
        run: safety check -r requirements.txt --output text

      # =====================================================
      # BANDIT — backend/application/ (código Flask)
      # exclui tests/ e migrations/
      # =====================================================
      - name: Bandit Scan
        id: bandit
        continue-on-error: true
        run: |
          bandit -r ./backend/application \
            --exit-zero \
            -ll \
            --exclude ./backend/tests,./backend/migrations \
            -f sarif \
            -o bandit.sarif
          echo "bandit_generated=$(test -f bandit.sarif && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Upload Bandit SARIF
        if: always() && steps.bandit.outputs.bandit_generated == 'true'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit.sarif
          category: bandit

      # =====================================================
      # SEMGREP — OWASP + Flask + Python + JS/TS + secrets
      # =====================================================
      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        id: semgrep
        continue-on-error: true
        shell: bash
        run: |
          set +e

          semgrep scan \
            --config "p/owasp-top-ten" \
            --config "p/flask" \
            --config "p/python" \
            --config "p/javascript" \
            --config "p/typescript" \
            --config "p/react" \
            --config "p/secrets" \
            --sarif \
            --output=semgrep.sarif \
            --timeout=120 \
            --exclude="**/node_modules/**" \
            --exclude="**/.next/**" \
            --exclude="**/migrations/**" \
            --exclude="**/__pycache__/**" \
            --error \
            .

          EXIT_CODE=$?

          echo "semgrep_exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          if [ -f semgrep.sarif ]; then
            echo "semgrep_generated=true" >> $GITHUB_OUTPUT
          else
            echo "semgrep_generated=false" >> $GITHUB_OUTPUT
          fi

          exit 0

      - name: Upload Semgrep SARIF
        if: always() && steps.semgrep.outputs.semgrep_generated == 'true'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      # =====================================================
      # SECRET SCANNING — Gitleaks (action oficial)
      # =====================================================
      - name: Gitleaks Scan
        id: gitleaks
        continue-on-error: true
        run: |
          GITLEAKS_VERSION="8.27.2"
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect \
            --source . \
            --redact \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --exit-code 0
          echo "gitleaks_generated=$(test -f gitleaks.sarif && echo true || echo false)" >> $GITHUB_OUTPUT

      # =====================================================
      # HADOLINT — lint dos Dockerfiles (backend + frontend)
      # =====================================================
      - name: Hadolint backend Dockerfile
        id: hadolint_back
        continue-on-error: true
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile
          format: sarif
          output-file: hadolint-backend.sarif
          no-fail: true

      - name: Hadolint frontend Dockerfile
        id: hadolint_front
        continue-on-error: true
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          format: sarif
          output-file: hadolint-frontend.sarif
          no-fail: true

      - name: Upload Hadolint backend SARIF
        if: always() && hashFiles('hadolint-backend.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: hadolint-backend.sarif
          category: hadolint-backend

      - name: Upload Hadolint frontend SARIF
        if: always() && hashFiles('hadolint-frontend.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: hadolint-frontend.sarif
          category: hadolint-frontend

      # =====================================================
      # DOCKER — build das imagens backend e frontend
      # Dockerfiles estão em backend/ e frontend/
      # =====================================================
      - name: Build Docker images
        id: docker_build
        continue-on-error: true
        run: |
          docker build -t app-backend-test ./backend
          docker build -t app-frontend-test ./frontend
          echo "built=true" >> $GITHUB_OUTPUT

      - name: Trivy Scan — backend image
        id: trivy_backend
        if: steps.docker_build.outputs.built == 'true'
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app-backend-test
          format: sarif
          output: trivy-backend.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload Trivy backend SARIF
        if: always() && steps.docker_build.outputs.built == 'true' && hashFiles('trivy-backend.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Trivy Scan — frontend image
        id: trivy_frontend
        if: steps.docker_build.outputs.built == 'true'
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app-frontend-test
          format: sarif
          output: trivy-frontend.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload Trivy frontend SARIF
        if: always() && steps.docker_build.outputs.built == 'true' && hashFiles('trivy-frontend.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

      # =====================================================
      # SBOM — CycloneDX (backend + frontend)
      # =====================================================
      - name: Gerar SBOM
        id: sbom
        continue-on-error: true
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Upload SBOM artifact
        if: always() && hashFiles('sbom.cdx.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json
          retention-days: 30

      # =====================================================
      # SONARCLOUD
      # projectKey: fabrica-bayarea_Tutor
      # sources: backend/application + frontend/app
      # testes: backend/application/tests
      # =====================================================
      - name: SonarCloud Scan
        id: sonar
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=fabrica-bayarea_Tutor
            -Dsonar.organization=fabrica-bayarea
            -Dsonar.sources=backend/application,frontend/app
            -Dsonar.tests=backend/application/tests
            -Dsonar.test.inclusions=**/test_*.py,**/*_test.py,**/*.spec.ts,**/*.test.ts,**/*.test.tsx
            -Dsonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/coverage/**,**/*.d.ts,**/__pycache__/**,**/*.pyc,**/migrations/**
            -Dsonar.coverage.exclusions=frontend/**,**/tests/**,**/test_*.py,**/*_test.py,**/__init__.py,**/migrations/**
            -Dsonar.python.version=3.11
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
            -Dsonar.python.coverage.reportPaths=backend/coverage.xml
            -Dsonar.qualitygate.wait=true

      # =====================================================
      # DEPENDENCY REVIEW — só em PRs
      # =====================================================
      - name: Dependency Review
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      # =====================================================
      # FINAL SECURITY GATE
      # failure  → bloqueia o pipeline (se for "block")
      # skipped  → aviso, não bloqueia
      # =====================================================
      - name: Security Gate
        if: always()
        shell: bash
        run: |
          FAILED=0

          check_step() {
            local name=$1
            local outcome=$2
            local blocking=$3   # "block" ou "warn"

            if [ "$outcome" = "failure" ]; then
              if [ "$blocking" = "block" ]; then
                echo "❌ $name failed (BLOCKING)"
                FAILED=1
              else
                echo "⚠️  $name failed (warning only)"
              fi
            elif [ "$outcome" = "skipped" ]; then
              echo "⚠️  $name was skipped"
            else
              echo "✅ $name: $outcome"
            fi
          }

          # =================================================
          # Semgrep (tratamento especial via exit code)
          # =================================================
          SEMGREP_EXIT="${{ steps.semgrep.outputs.semgrep_exit_code }}"

          if [ -z "$SEMGREP_EXIT" ]; then
            echo "❌ Semgrep exit code missing (BLOCKING)"
            FAILED=1
          elif [ "$SEMGREP_EXIT" != "0" ]; then
            echo "❌ Semgrep failed (BLOCKING)"
            FAILED=1
          else
            echo "✅ Semgrep passed"
          fi

          # =================================================
          # Bloqueantes
          # =================================================
          check_step "SonarCloud"       "${{ steps.sonar.outcome }}"           "block"
          check_step "Gitleaks"         "${{ steps.gitleaks.outcome }}"        "block"
          check_step "Bandit"           "${{ steps.bandit.outcome }}"          "block"

          # =================================================
          # Não-bloqueantes (warnings)
          # =================================================
          check_step "Trivy backend"    "${{ steps.trivy_backend.outcome }}"   "warn"
          check_step "Trivy frontend"   "${{ steps.trivy_frontend.outcome }}"  "warn"
          check_step "Hadolint BE"      "${{ steps.hadolint_back.outcome }}"   "warn"
          check_step "Hadolint FE"      "${{ steps.hadolint_front.outcome }}"  "warn"
          check_step "npm audit"        "${{ steps.npm_audit.outcome }}"       "warn"
          check_step "pip-audit"        "${{ steps.pipaudit.outcome }}"        "warn"
          check_step "Safety"           "${{ steps.safety.outcome }}"          "warn"
          check_step "Docker build"     "${{ steps.docker_build.outcome }}"    "warn"
          check_step "SBOM"             "${{ steps.sbom.outcome }}"            "warn"

          echo ""

          if [ "$FAILED" -eq 1 ]; then
            echo "❌ Security pipeline FAILED — revise os achados acima"
            exit 1
          fi

          echo "✅ Security pipeline APPROVED"