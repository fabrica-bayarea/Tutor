version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: tutor_db_prod
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: tutor
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod # Usa o Dockerfile de produção
    container_name: tutor_backend_prod
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      - db
    # Em produção, a porta interna do Gunicorn (8000) pode ser mapeada para 5000 externamente
    ports:
      - "5000:8000"

  frontend:
    build: ./frontend # O Dockerfile do frontend já é otimizado
    container_name: tutor_frontend_prod
    restart: always
    ports:
      - "3000:3000"

volumes:
  postgres_data_prod: