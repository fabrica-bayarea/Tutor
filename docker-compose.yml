version: '3.8'

services:
  postgres-service:
    image: postgres:16-alpine
    container_name: tutor_db_prod
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: tutor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

  ollama-service:
    image: ollama/ollama:latest
    container_name: tutor_ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  redis-service:
    image: redis:7-alpine
    container_name: tutor_redis_prod
    restart: always
    volumes:
      - redis_data_prod:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tutor_backend_prod
    restart: always
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama-service:11434
      - REDIS_URL=redis://redis-service:6379/0
      # Sincroniza os modelos de IA com o Ollama no boot (US-38.4). Bloqueia a
      # inicialização se algum pull falhar.
      - PULL_MODELS_ON_STARTUP=true
    depends_on:
      - postgres-service
      - ollama-service
      - redis-service
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        NEXT_PUBLIC_API_URL_RUNTIME: ${NEXT_PUBLIC_API_URL_RUNTIME}
      dockerfile: Dockerfile
    container_name: tutor_frontend_prod
    restart: always
    env_file:
      - .env
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data_prod:
  ollama_data:
  redis_data_prod:
