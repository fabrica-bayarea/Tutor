version: '3.8'

services:
  postgres-service:
    image: postgres:16-alpine
    container_name: tutor_db_prod
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: tutor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

  ollama-service:
    image: ollama/ollama:latest
    container_name: tutor_ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tutor_backend_prod
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - OLLAMA_HOST=http://ollama-service:11434
    depends_on:
      - postgres-service
      - ollama-service
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tutor_frontend_prod
    restart: always
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data_prod:
  ollama_data: