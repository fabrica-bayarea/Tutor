version: '3.8'

services:
  postgres-service:
    image: postgres:16-alpine
    container_name: tutor_db_prod
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: tutor
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tutor_backend_prod
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      - postgres-service
    ports:
      - "5000:8000"

volumes:
  postgres_data_prod: