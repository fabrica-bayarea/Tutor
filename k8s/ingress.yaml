apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tutor-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
  - host: tutor.local
    http:
      paths:
      # Backend: todas as requisições começando com /api
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 5000

      # Frontend: tudo que não for /api
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
